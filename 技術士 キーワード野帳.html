<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>技術士 野帳 - キーワード暗記</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#EAF1EC;
    --paper-line:#c9d8cd;
    --ink:#1F2D28;
    --ink-soft:#4b5c53;
    --flag:#E8622C;
    --flag-soft:#f6d9c9;
    --box1:#C94C3D;
    --box2:#D9A441;
    --box3:#3F8F6B;
    --card-bg:#FAFCF9;
    --shadow: 0 10px 30px rgba(31,45,40,0.18);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:'Zen Kaku Gothic New','Hiragino Sans',sans-serif;
    color:var(--ink);
    background:
      repeating-linear-gradient(to bottom, transparent 0 27px, var(--paper-line) 27px 28px),
      var(--paper);
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding:0 0 40px 0;
  }
  .binder{
    width:100%;
    max-width:480px;
    min-height:100vh;
    background:transparent;
    position:relative;
    padding-left:34px;
  }
  .holes{
    position:absolute; left:8px; top:0; bottom:0; width:18px;
    display:flex; flex-direction:column; justify-content:flex-start; align-items:center;
    gap:26px; padding-top:40px;
  }
  .hole{
    width:12px;height:12px;border-radius:50%;
    background:var(--paper);
    box-shadow: inset 0 2px 3px rgba(0,0,0,0.25), 0 1px 0 rgba(255,255,255,0.6);
    border:1px solid #b8c9be;
  }
  header{
    padding:22px 18px 10px 4px;
  }
  .eyebrow{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px; letter-spacing:.14em; color:var(--ink-soft);
    text-transform:uppercase;
  }
  h1{
    margin:4px 0 2px 0;
    font-size:26px;
    font-weight:900;
    letter-spacing:.02em;
  }
  .sub{
    font-size:12.5px; color:var(--ink-soft); margin-bottom:6px;
  }

  /* ---- dashboard ---- */
  .dash{ padding:6px 18px 0 4px; }
  .stat-row{ display:flex; gap:8px; margin:10px 0 14px 0; }
  .stat{
    flex:1; background:var(--card-bg); border:1px solid var(--paper-line);
    border-radius:10px; padding:10px 8px; text-align:center;
    box-shadow:0 2px 0 var(--paper-line);
  }
  .stat .num{ font-family:'IBM Plex Mono',monospace; font-weight:700; font-size:20px; }
  .stat .lbl{ font-size:10.5px; color:var(--ink-soft); margin-top:2px; }
  .stat.b1 .num{color:var(--box1);}
  .stat.b2 .num{color:var(--box2);}
  .stat.b3 .num{color:var(--box3);}

  .seg{
    display:flex; background:var(--card-bg); border:1px solid var(--paper-line);
    border-radius:10px; overflow:hidden; margin-bottom:10px;
  }
  .seg button{
    flex:1; border:none; background:transparent; padding:9px 4px;
    font-family:'Zen Kaku Gothic New',sans-serif; font-size:12.5px; font-weight:700;
    color:var(--ink-soft); cursor:pointer;
  }
  .seg button.active{ background:var(--ink); color:var(--paper); }

  .catgrid{ display:flex; flex-wrap:wrap; gap:6px; margin-bottom:14px; }
  .chip{
    font-family:'IBM Plex Mono',monospace; font-size:11px; padding:6px 10px;
    border-radius:999px; border:1px solid var(--paper-line); background:var(--card-bg);
    color:var(--ink-soft); cursor:pointer;
  }
  .chip.active{ background:var(--flag); border-color:var(--flag); color:#fff; }

  .cta{
    display:block; width:100%; padding:15px; margin-top:6px;
    background:var(--flag); color:#fff; border:none; border-radius:12px;
    font-family:'Zen Kaku Gothic New',sans-serif; font-weight:900; font-size:16px;
    letter-spacing:.02em; cursor:pointer; box-shadow:0 6px 0 #b8481f;
    transition:transform .06s;
  }
  .cta:active{ transform:translateY(4px); box-shadow:0 2px 0 #b8481f; }
  .cta.secondary{
    background:var(--card-bg); color:var(--ink); border:1px solid var(--paper-line);
    box-shadow:0 4px 0 var(--paper-line); font-weight:700; font-size:14px; margin-top:10px;
  }
  .cta.secondary:active{ box-shadow:0 1px 0 var(--paper-line); }
  .hint{ font-size:11.5px; color:var(--ink-soft); text-align:center; margin-top:8px; line-height:1.6;}

  /* ---- session view ---- */
  #session{ display:none; padding:14px 18px 10px 4px; }
  .progress-wrap{ display:flex; align-items:center; gap:8px; margin-bottom:14px;}
  .progress-track{ flex:1; height:6px; background:var(--paper-line); border-radius:3px; overflow:hidden;}
  .progress-fill{ height:100%; background:var(--flag); width:0%; transition:width .25s;}
  .progress-txt{ font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--ink-soft); white-space:nowrap;}

  .card{
    background:var(--card-bg); border-radius:16px; box-shadow:var(--shadow);
    border:1px solid var(--paper-line); min-height:340px;
    padding:22px 18px; position:relative; cursor:pointer;
    display:flex; flex-direction:column;
  }
  .card .tab{
    position:absolute; top:-10px; left:16px; font-family:'IBM Plex Mono',monospace;
    font-size:10.5px; font-weight:700; color:#fff; padding:3px 10px; border-radius:6px;
  }
  .card .setTag{
    position:absolute; top:-10px; right:16px; font-family:'IBM Plex Mono',monospace;
    font-size:10px; font-weight:700; padding:3px 9px; border-radius:6px;
    background:var(--ink); color:var(--paper);
  }
  .term-face{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; gap:14px;}
  .term-face .term{ font-size:23px; font-weight:900; line-height:1.4; }
  .term-face .flipmsg{ font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--ink-soft); letter-spacing:.08em; }

  .back-face{ display:none; flex-direction:column; gap:10px; overflow-y:auto; max-height:420px; }
  .back-face .term-mini{ font-size:16px; font-weight:900; margin-bottom:2px; padding-bottom:8px; border-bottom:2px solid var(--ink);}
  .field{ }
  .field .flabel{
    font-family:'IBM Plex Mono',monospace; font-size:10px; font-weight:700; letter-spacing:.06em;
    color:#fff; background:var(--ink-soft); display:inline-block; padding:2px 7px; border-radius:5px; margin-bottom:4px;
  }
  .field .fbody{ font-size:13.5px; line-height:1.55; }
  .card.flipped .term-face{ display:none; }
  .card.flipped .back-face{ display:flex; }

  .rate-row{ display:flex; gap:8px; margin-top:14px; }
  .rate{
    flex:1; padding:13px 4px; border:none; border-radius:12px; font-weight:900; font-size:13px;
    color:#fff; cursor:pointer; font-family:'Zen Kaku Gothic New',sans-serif;
  }
  .rate.bad{ background:var(--box1); }
  .rate.mid{ background:var(--box2); }
  .rate.good{ background:var(--box3); }
  #session .cta.secondary{ margin-top:12px; }

  /* ---- summary ---- */
  #summary{ display:none; padding:26px 18px; text-align:center; }
  #summary .big{ font-size:44px; font-weight:900; font-family:'IBM Plex Mono',monospace; color:var(--flag); }

  footer.note{ padding:20px 18px 4px 4px; font-size:11px; color:var(--ink-soft); line-height:1.7; }
</style>
</head>
<body>
<div class="binder">
  <div class="holes" id="holes"></div>

  <div id="home">
    <header>
      <div class="eyebrow">技術士 二次試験 ・ 情報システム</div>
      <h1>キーワード野帳</h1>
      <div class="sub">全113語 ／ ライトナー式で「要復習」だけ効率的に回す</div>
    </header>

    <div class="dash">
      <div class="stat-row">
        <div class="stat b1"><div class="num" id="stat-box1">-</div><div class="lbl">要復習<br>(BOX1)</div></div>
        <div class="stat b2"><div class="num" id="stat-box2">-</div><div class="lbl">あやふや<br>(BOX2)</div></div>
        <div class="stat b3"><div class="num" id="stat-box3">-</div><div class="lbl">定着<br>(BOX3)</div></div>
      </div>

      <div class="seg" id="setSeg">
        <button data-set="all" class="active">全113語</button>
        <button data-set="confirmed">実績82語</button>
        <button data-set="predicted">予測28語</button>
      </div>

      <div class="catgrid" id="catgrid"></div>

      <button class="cta" id="startBtn">今日の学習をはじめる（最大12語）</button>
      <button class="cta secondary" id="startAllDue">出題対象を全部やる</button>
      <div class="hint" id="dueHint">-</div>
    </div>

    <footer class="note">
      通勤時間などのすきま時間向け。カードをタップでめくり、思い出せた度合いをボタンで記録します。記録はこの端末に保存され、次回開いたときも引き継がれます。
    </footer>
  </div>

  <div id="session">
    <div class="progress-wrap">
      <div class="progress-track"><div class="progress-fill" id="progFill"></div></div>
      <div class="progress-txt" id="progTxt">0/0</div>
    </div>

    <div class="card" id="card">
      <div class="tab" id="cardTab">BOX1</div>
      <div class="setTag" id="cardSetTag">実績</div>
      <div class="term-face">
        <div class="term" id="cardTerm">用語</div>
        <div class="flipmsg">タップして一言定義を確認</div>
      </div>
      <div class="back-face" id="cardBack"></div>
    </div>

    <div class="rate-row" id="rateRow" style="display:none;">
      <button class="rate bad" data-rate="0">✕ わからない</button>
      <button class="rate mid" data-rate="1">△ あやふや</button>
      <button class="rate good" data-rate="2">◯ わかった</button>
    </div>

    <button class="cta secondary" id="quitBtn">中断してホームに戻る</button>
  </div>

  <div id="summary">
    <div class="eyebrow">今日の学習おつかれさまでした</div>
    <div class="big" id="summaryCount">0</div>
    <div class="sub">語を確認しました</div>
    <button class="cta" id="backHomeBtn" style="margin-top:22px;">ホームに戻る</button>
  </div>
</div>

<script>

const STORAGE_KEY = 'flashcard-progress-v1';
let progress = {}; // id -> {box, lastSeen}

function todayNum(){ return Math.floor(Date.now()/86400000); }

async function loadProgress(){
  try{
    const res = await window.storage.get(STORAGE_KEY);
    progress = res && res.value ? JSON.parse(res.value) : {};
  }catch(e){ progress = {}; }
  CARDS.forEach(c=>{
    if(!progress[c.id]) progress[c.id] = {box:1, lastSeen:0};
  });
}
async function saveProgress(){
  try{ await window.storage.set(STORAGE_KEY, JSON.stringify(progress)); }catch(e){}
}

function isDue(card){
  const p = progress[card.id];
  if(!p) return true;
  const days = todayNum() - p.lastSeen;
  if(p.box===1) return true;
  if(p.box===2) return days>=3;
  if(p.box===3) return days>=7;
  return true;
}

let activeSet = 'all';
let activeCats = new Set(); // empty = all

function filteredCards(){
  return CARDS.filter(c=>{
    if(activeSet!=='all' && c.tag!==activeSet) return false;
    if(activeCats.size>0 && !activeCats.has(c.topCategory)) return false;
    return true;
  });
}

}

    if(box===1) b1++; else if(box===2) b2++; else b3++;
  });
  document.getElementById('stat-box1').textContent=b1;
  document.getElementById('stat-box2').textContent=b2;
  document.getElementById('stat-box3').textContent=b3;
  const due = list.filter(isDue).length;
  document.getElementById('dueHint').textContent = `対象 ${list.length}語中 ${due}語が本日の復習対象です`;
}

function renderCatChips(){
  const cats = ['セキュリティ','AI','インフラ','データ','DX','組織・PM','開発手法'];
  const wrap = document.getElementById('catgrid');
  wrap.innerHTML='';
  cats.forEach(cat=>{
    const chip = document.createElement('div');
    chip.className='chip'+(activeCats.has(cat)?' active':'');
    chip.textContent = cat;
    chip.onclick = ()=>{
      if(activeCats.has(cat)) activeCats.delete(cat); else activeCats.add(cat);
      renderCatChips(); renderDash();
    };
    wrap.appendChild(chip);
  });
}

document.getElementById('setSeg').addEventListener('click', (e)=>{
  const btn = e.target.closest('button'); if(!btn) return;
  activeSet = btn.dataset.set;
  [...document.getElementById('setSeg').children].forEach(b=>b.classList.toggle('active', b===btn));
  renderDash();
});

// ---- session logic ----
let queue = [];
let qIndex = 0;
let sessionSeen = 0;
let flipped = false;

function buildQueue(limit){
  let pool = filteredCards().filter(isDue);
  // priority: box1 first, then box2, then box3, then not-due new-ish (box with lastSeen 0)
  pool.sort((a,b)=> progress[a.id].box - progress[b.id].box);
  if(limit) pool = pool.slice(0, limit);
  return pool;
}

function startSession(limit){
  queue = buildQueue(limit);
  if(queue.length===0){
    alert('本日の復習対象はありません。おつかれさまでした！');
    return;
  }
  qIndex = 0; sessionSeen = 0;
  document.getElementById('home').style.display='none';
  document.getElementById('summary').style.display='none';
  document.getElementById('session').style.display='block';
  showCard();
}

function showCard(){
  flipped = false;
  const c = queue[qIndex];
  const card = document.getElementById('card');
  card.classList.remove('flipped');
  document.getElementById('cardTerm').textContent = c.term;
  document.getElementById('cardSetTag').textContent = c.tag==='confirmed' ? '実績' : '予測';
  const box = progress[c.id].box;
  const tab = document.getElementById('cardTab');
  tab.textContent = box===1?'BOX1 要復習':(box===2?'BOX2 あやふや':'BOX3 定着');
  tab.style.background = box===1?'var(--box1)':(box===2?'var(--box2)':'var(--box3)');

  const back = document.getElementById('cardBack');
  back.innerHTML = `
    <div class="term-mini">${c.term}<br><span style="font-weight:400;font-size:11px;color:var(--ink-soft);">${c.category}</span></div>
    ${field('一言定義', c.definition)}
    ${field('概要', c.overview)}
    ${field('メリット', c.merit)}
    ${field('留意点', c.caution)}
    ${c.confusable? field('紛らわしい用語', c.confusable):''}
    ${c.question? field('想定設問', c.question):''}
  `;
  document.getElementById('rateRow').style.display='none';
  document.getElementById('progFill').style.width = (qIndex/queue.length*100)+'%';
  document.getElementById('progTxt').textContent = `${qIndex+1}/${queue.length}`;
}
function field(label, body){
  if(!body) return '';
  return `<div class="field"><span class="flabel">${label}</span><div class="fbody">${body}</div></div>`;
}

document.getElementById('card').addEventListener('click', ()=>{
  if(flipped) return;
  flipped = true;
  document.getElementById('card').classList.add('flipped');
  document.getElementById('rateRow').style.display='flex';
});

document.getElementById('rateRow').addEventListener('click', async (e)=>{
  const btn = e.target.closest('button'); if(!btn) return;
  const rate = parseInt(btn.dataset.rate);
  const c = queue[qIndex];
  const p = progress[c.id];
  if(rate===0){ p.box = 1; }
  else if(rate===1){ p.box = Math.max(1, p.box); }
  else { p.box = Math.min(3, p.box+1); }
  p.lastSeen = todayNum();
  await saveProgress();
  sessionSeen++;
  qIndex++;
  if(qIndex>=queue.length){
    endSession();
  } else {
    showCard();
  }
});

function endSession(){
  document.getElementById('session').style.display='none';
  document.getElementById('summary').style.display='block';
  document.getElementById('summaryCount').textContent = sessionSeen;
  renderDash();
}

document.getElementById('startBtn').onclick = ()=> startSession(12);
document.getElementById('startAllDue').onclick = ()=> startSession(null);
document.getElementById('quitBtn').onclick = ()=>{
  document.getElementById('session').style.display='none';
  document.getElementById('home').style.display='block';
  renderDash();
};
document.getElementById('backHomeBtn').onclick = ()=>{
  document.getElementById('summary').style.display='none';
  document.getElementById('home').style.display='block';
};

(async function init(){
  renderHoles();
  await loadProgress();
  renderCatChips();
  renderDash();
})();
</script>
